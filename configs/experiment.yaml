# Unified Experiment Configuration
# This single file includes dataset selection, feature engineering, labeling,
# model choice/parameters, and training output behavior.

training:
  output_dir: "Results/experiment_1"
  save_model: true
  train_all_models: false
  comparison_csv: "model_comparison.csv"
  metrics:
    - "precision"
    - "recall"
    - "f1"
    - "accuracy"
    - "confusion_matrix"
  evaluation:
    compare_baseline: true
    show_plots: false

dataset:
  data_path: "StockData/AllSTOCKS.pk"
  source_tickers: ["HDFCBANK"] # null means all
  # source_tickers: ["ADANIENT","ADANIPORTS","APOLLOHOSP","ASIANPAINT","AXISBANK","BAJAJ-AUTO","BAJFINANCE","BAJAJFINSV","BEL","BPCL","BHARTIARTL","BRITANNIA","CIPLA","COALINDIA","DRREDDY","EICHERMOT","GRASIM","HCLTECH","HDFCBANK","HDFCLIFE","HEROMOTOCO","HINDALCO","HINDUNILVR","ICICIBANK","ITC","INDUSINDBK","INFY","JSWSTEEL","KOTAKBANK","LT","M&M","MARUTI","NTPC","NESTLEIND","ONGC","POWERGRID","RELIANCE","SBILIFE","SHRIRAMFIN","SBIN","SUNPHARMA","TCS","TATACONSUM","TATAMOTORS","TATASTEEL","TECHM","TITAN","TRENT","ULTRACEMCO","WIPRO"]
  target_tickers: ["HDFCBANK"] # null means all
  train_end_date: "2023-12-31"
  test_start_date: "2024-01-01"
  dataset_mode: "tabular" # tabular | sequence
  seq_length: 10

labeling:
  holding_period: 10
  target_pct: 0.1
  stop_loss_pct: 0.05
  negative_label: -1
  stop_loss_check: "low" # low | close
  target_check: "high" # high | close
  exit_on_gap: true

features:
  indicators:
    - name: "Returns"
      type: "price"
      params:
        windows: [1, 3, 5, 10, 20]

    - name: "LogReturns"
      type: "price"
      params:
        windows: [1]

    - name: "VolumeChange"
      type: "volume"
      params:
        windows: [1, 5]

    - name: "OBV"
      type: "volume"
      params: {}

    - name: "VWMA"
      type: "volume"
      params:
        windows: [20]

    - name: "SMA"
      type: "trend"
      params:
        windows: [10, 20, 50, 200]

    - name: "EMA"
      type: "trend"
      params:
        windows: [10, 20, 50]

    - name: "SMA_Slope"
      type: "trend"
      params:
        windows: [20]

    - name: "RSI"
      type: "momentum"
      params:
        window: 14

    - name: "ROC"
      type: "momentum"
      params:
        windows: [5, 10, 20]

    - name: "ATR"
      type: "volatility"
      params:
        window: 14

    - name: "RollingStd"
      type: "volatility"
      params:
        windows: [20]

    - name: "BB_Width"
      type: "volatility"
      params:
        window: 20
        std_dev: 2

    - name: "ZScore"
      type: "stat"
      params:
        windows: [20, 60]

model:
  # model_type: "xgboost"
  model_type: ["xgboost","random_forest","logistic_regression","mlp","lstm","cnn"]
  # model_types: ["xgboost", "lstm", "cnn"] # optional multi-model override
  params:
    xgboost:
      n_estimators: 100
      max_depth: 5
      learning_rate: 0.1
      objective: "multi:softmax"
      num_class: 3
      n_jobs: -1
      random_state: 42

    random_forest:
      n_estimators: 100
      max_depth: 10
      n_jobs: -1
      random_state: 42

    logistic_regression:
      C: 1.0
      solver: "lbfgs"
      multi_class: "multinomial"
      max_iter: 1000
      n_jobs: -1

    mlp:
      hidden_layers: [64, 32]
      dropout: 0.2
      epochs: 20
      batch_size: 32
      learning_rate: 0.001

    lstm:
      hidden_dim: 64
      num_layers: 2
      dropout: 0.2
      seq_length: 10
      epochs: 20
      batch_size: 32
      learning_rate: 0.001

    cnn:
      conv_channels: [64, 128]
      kernel_size: 3
      hidden_dim: 64
      dropout: 0.2
      seq_length: 10
      epochs: 20
      batch_size: 32
      learning_rate: 0.001
